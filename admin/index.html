<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administración | Viajes La Mar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=League+Gothic&family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- SheetJS para exportación a Excel -->
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <style>
        * { font-family: 'Montserrat', sans-serif; }
        .font-league { font-family: 'League Gothic', sans-serif; }
        .hidden { display: none !important; }
        .field-label { display: block; font-size: 0.75rem; font-weight: 700; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.25rem; }
        .field-input { width: 100%; padding: 0.5rem 0.75rem; background-color: #f8fafc; border: 1px solid #e2e8f0; border-radius: 0.5rem; font-size: 0.875rem; outline: none; transition: box-shadow 0.15s; }
        .field-input:focus { box-shadow: 0 0 0 2px #38bdf8; }
        .card { background: #fff; border-radius: 1rem; box-shadow: 0 1px 2px rgba(0,0,0,.05); border: 1px solid #e2e8f0; padding: 1.5rem; }
        .btn-primary { background: #0ea5e9; color: #fff; font-weight: 700; font-size: 0.75rem; letter-spacing: 0.05em; padding: 0.5rem 1rem; border-radius: 0.5rem; transition: background 0.15s; display: inline-flex; align-items: center; gap: 0.5rem; cursor: pointer; }
        .btn-primary:hover { background: #38bdf8; }
        .btn-danger { background: #ef4444; color: #fff; font-weight: 700; font-size: 0.75rem; letter-spacing: 0.05em; padding: 0.5rem 1rem; border-radius: 0.5rem; transition: background 0.15s; display: inline-flex; align-items: center; gap: 0.5rem; cursor: pointer; }
        .btn-danger:hover { background: #f87171; }
        .btn-ghost { background: #f1f5f9; color: #475569; font-weight: 700; font-size: 0.75rem; letter-spacing: 0.05em; padding: 0.5rem 1rem; border-radius: 0.5rem; transition: background 0.15s; display: inline-flex; align-items: center; gap: 0.5rem; cursor: pointer; }
        .btn-ghost:hover { background: #e2e8f0; }
        .itin-row { display: grid; grid-template-columns: 1fr 2fr auto; gap: 0.5rem; align-items: center; }
        .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 50; display: flex; align-items: center; justify-content: center; padding: 1rem; }
        .modal-box { background: white; border-radius: 1rem; box-shadow: 0 25px 50px rgba(0,0,0,0.25); width: 100%; max-width: 42rem; max-height: 90vh; overflow-y: auto; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800">

<!-- LOGIN -->
<div id="login-screen" class="min-h-screen flex items-center justify-center bg-slate-100">
    <div class="bg-white p-8 rounded-3xl shadow-xl w-full max-w-sm text-center">
        <div class="w-16 h-16 bg-sky-500 rounded-2xl flex items-center justify-center mx-auto mb-4">
            <i data-lucide="shield" class="w-8 h-8 text-white"></i>
        </div>
        <h1 class="font-league text-4xl text-slate-800 mb-1 tracking-widest">LA MAR ADMIN</h1>
        <p class="text-xs text-slate-400 mb-6 uppercase tracking-widest">Panel de Control Privado</p>
        <form id="login-form" class="space-y-4">
            <div class="relative">
                <input type="password" id="admin-pwd" required placeholder="Contraseña de administrador"
                    class="w-full px-5 py-3 bg-slate-50 rounded-xl border border-slate-200 outline-none focus:ring-2 focus:ring-sky-400 pr-12 text-sm">
                <button type="button" onclick="togglePwd()" class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600">
                    <i data-lucide="eye" id="eye-icon" class="w-4 h-4"></i>
                </button>
            </div>
            <button id="login-btn" type="submit"
                class="w-full bg-sky-500 hover:bg-sky-400 text-white py-3 rounded-xl font-bold tracking-widest text-xs transition flex items-center justify-center gap-2">
                <i data-lucide="log-in" class="w-4 h-4"></i> INGRESAR
            </button>
        </form>
        <p id="login-error" class="text-red-500 text-xs mt-4 hidden font-bold"></p>
    </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard-screen" class="hidden flex flex-col min-h-screen">

    <!-- Header -->
    <header class="bg-slate-900 text-white px-6 py-4 flex justify-between items-center shadow-md sticky top-0 z-40">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 bg-sky-500 rounded-lg flex items-center justify-center">
                <i data-lucide="settings" class="w-4 h-4 text-white"></i>
            </div>
            <span class="font-league text-2xl tracking-widest">PANEL DE CONTROL</span>
        </div>
        <div class="flex items-center gap-3">
            <button id="save-btn" onclick="saveAll()"
                class="bg-sky-500 hover:bg-sky-400 px-5 py-2 rounded-lg font-bold text-xs tracking-widest flex items-center gap-2 transition">
                <i data-lucide="save" class="w-4 h-4"></i> GUARDAR TODO
            </button>
            <button onclick="logout()" class="text-slate-400 hover:text-white transition p-2" title="Cerrar sesión">
                <i data-lucide="log-out" class="w-5 h-5"></i>
            </button>
        </div>
    </header>

    <!-- Tabs nav -->
    <nav class="bg-white border-b border-slate-200 px-6 flex gap-6 sticky top-[72px] z-30">
        <button onclick="switchTab('paquetes')" id="nav-paquetes"
            class="py-4 text-xs font-bold uppercase tracking-widest border-b-2 border-sky-500 text-sky-500 transition">
            <i data-lucide="package" class="w-4 h-4 inline mr-1"></i> Paquetes
        </button>
        <button onclick="switchTab('imagenes')" id="nav-imagenes"
            class="py-4 text-xs font-bold uppercase tracking-widest border-b-2 border-transparent text-slate-400 hover:text-slate-700 transition">
            <i data-lucide="image" class="w-4 h-4 inline mr-1"></i> Imágenes
        </button>
        <button onclick="switchTab('salidas')" id="nav-salidas"
            class="py-4 text-xs font-bold uppercase tracking-widest border-b-2 border-transparent text-slate-400 hover:text-slate-700 transition">
            <i data-lucide="calendar" class="w-4 h-4 inline mr-1"></i> Salidas
        </button>
    </nav>

    <!-- Main -->
    <main class="flex-1 p-6 md:p-8 max-w-6xl w-full mx-auto">

        <!-- PAQUETES -->
        <div id="tab-paquetes">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold text-slate-700">Paquetes Destacados</h2>
                <div class="flex gap-2">
                    <button onclick="exportToExcel('paquetes')" class="btn-ghost">
                        <i data-lucide="download" class="w-4 h-4"></i> Exportar Excel
                    </button>
                    <button onclick="openPaqueteModal(null)" class="btn-primary">
                        <i data-lucide="plus" class="w-4 h-4"></i> Nuevo Paquete
                    </button>
                </div>
            </div>
            <div id="paquetes-list" class="space-y-4"></div>
        </div>

        <!-- IMAGENES -->
        <div id="tab-imagenes" class="hidden">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold text-slate-700">Mapa de Imágenes</h2>
                <button onclick="addImageRow()" class="btn-primary">
                    <i data-lucide="plus" class="w-4 h-4"></i> Nueva Imagen
                </button>
            </div>
            <div class="card">
                <p class="text-xs text-slate-400 mb-4">Relaciona un ID de destino con la ruta de su imagen.</p>
                <div id="imagenes-list" class="space-y-3"></div>
            </div>
        </div>

        <!-- SALIDAS -->
        <div id="tab-salidas" class="hidden">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold text-slate-700">Salidas Programadas</h2>
                <div class="flex gap-2">
                    <button onclick="exportToExcel('salidas')" class="btn-ghost">
                        <i data-lucide="download" class="w-4 h-4"></i> Exportar Excel
                    </button>
                    <button onclick="openSalidaModal(null)" class="btn-primary">
                        <i data-lucide="plus" class="w-4 h-4"></i> Nueva Salida
                    </button>
                </div>
            </div>
            <div id="salidas-list" class="space-y-4"></div>
        </div>

    </main>
</div>

<!-- MODAL PAQUETE -->
<div id="pkg-modal" class="modal-bg hidden">
    <div class="modal-box">
        <div class="flex justify-between items-center p-6 border-b">
            <h3 class="font-bold text-lg" id="pkg-modal-title">Paquete</h3>
            <button onclick="closeModal('pkg-modal')" class="text-slate-400 hover:text-slate-700"><i data-lucide="x" class="w-5 h-5"></i></button>
        </div>
        <div class="p-6 space-y-4">
            <input type="hidden" id="pkg-idx">
            <div class="grid grid-cols-2 gap-4">
                <div><label class="field-label">ID (único, sin espacios)</label><input id="pkg-id" type="text" class="field-input" placeholder="cancun"></div>
                <div><label class="field-label">Nombre</label><input id="pkg-nombre" type="text" class="field-input" placeholder="CANCÚN"></div>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div><label class="field-label">Tagline</label><input id="pkg-tagline" type="text" class="field-input" placeholder="Caribe • All Inclusive"></div>
                <div>
                    <label class="field-label">Precio</label>
                    <div class="relative">
                        <span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 font-bold text-sm">Q.</span>
                        <input id="pkg-precio" type="text" class="field-input pl-8" placeholder="5,499.00">
                    </div>
                </div>
            </div>
            <div><label class="field-label">Descripción</label><textarea id="pkg-descripcion" rows="3" class="field-input"></textarea></div>
            <div><label class="field-label">Más Información (Complementaria)</label><textarea id="pkg-mas_info" rows="3" class="field-input" placeholder="Detalles adicionales del paquete..."></textarea></div>
            <div>
                <label class="field-label">Mapa Embed URL</label>
                <div class="flex gap-2">
                    <input id="pkg-mapEmbed" type="text" class="field-input flex-1" placeholder="https://www.google.com/maps/embed?...">
                    <button onclick="searchMapEmbed('pkg-nombre')" class="btn-ghost" title="Buscar en Google Maps">
                        <i data-lucide="search" class="w-4 h-4"></i>
                    </button>
                </div>
            </div>
            <div>
                <label class="field-label">Imagen</label>
                <div class="flex gap-2">
                    <input id="pkg-imagen-url" type="text" class="field-input flex-1" placeholder="assets/images/cancun.jpg">
                    <label class="btn-ghost cursor-pointer">
                        <i data-lucide="upload" class="w-4 h-4"></i> Subir
                        <input type="file" class="hidden" accept="image/*" onchange="handleFileUpload(this, 'pkg-imagen-url')">
                    </label>
                </div>
            </div>
            <div>
                <div class="flex justify-between items-center mb-2">
                    <label class="field-label" style="margin-bottom:0">¿Qué Incluye?</label>
                    <button onclick="addPkgIncluye()" class="btn-ghost" style="padding:0.25rem 0.5rem;font-size:0.7rem"><i data-lucide="plus" class="w-3 h-3"></i> Agregar</button>
                </div>
                <div id="pkg-incluye-list" class="space-y-2"></div>
            </div>
            <div>
                <div class="flex justify-between items-center mb-2">
                    <label class="field-label" style="margin-bottom:0">Itinerario (Días)</label>
                    <button onclick="addPkgItin()" class="btn-ghost" style="padding:0.25rem 0.5rem;font-size:0.7rem"><i data-lucide="plus" class="w-3 h-3"></i> Agregar Día</button>
                </div>
                <div id="pkg-itin-list" class="space-y-2"></div>
            </div>
        </div>
        <div class="p-6 border-t flex justify-end gap-3">
            <button onclick="closeModal('pkg-modal')" class="btn-ghost">Cancelar</button>
            <button onclick="savePaquete()" class="btn-primary"><i data-lucide="save" class="w-4 h-4"></i> Guardar Paquete</button>
        </div>
    </div>
</div>

<!-- MODAL SALIDA -->
<div id="salida-modal" class="modal-bg hidden">
    <div class="modal-box">
        <div class="flex justify-between items-center p-6 border-b">
            <h3 class="font-bold text-lg" id="salida-modal-title">Salida Programada</h3>
            <button onclick="closeModal('salida-modal')" class="text-slate-400 hover:text-slate-700"><i data-lucide="x" class="w-5 h-5"></i></button>
        </div>
        <div class="p-6 space-y-4">
            <input type="hidden" id="salida-idx">
            <div class="grid grid-cols-2 gap-4">
                <div><label class="field-label">ID (único)</label><input id="salida-id" type="text" class="field-input" placeholder="grupo-cancun-may"></div>
                <div><label class="field-label">Categoría</label>
                    <select id="salida-categoria" class="field-input">
                        <option value="grupal">Grupal</option>
                        <option value="promocion">Promoción</option>
                    </select>
                </div>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div><label class="field-label">Destino</label><input id="salida-destino" type="text" class="field-input" placeholder="CANCÚN"></div>
                <div><label class="field-label">Fecha</label><input id="salida-fecha" type="date" class="field-input"></div>
            </div>
            <div class="grid grid-cols-3 gap-4">
                <div><label class="field-label">Noches</label><input id="salida-noches" type="number" class="field-input" placeholder="5"></div>
                <div><label class="field-label">Tipo</label><input id="salida-tipo" type="text" class="field-input" placeholder="Aventura"></div>
                <div><label class="field-label">Estado</label>
                    <select id="salida-estado" class="field-input">
                        <option value="available">Disponible</option>
                        <option value="few">Últimos cupos</option>
                        <option value="full">Lleno</option>
                    </select>
                </div>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="field-label">Precio</label>
                    <div class="relative">
                        <span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 font-bold text-sm">Q.</span>
                        <input id="salida-precio" type="text" class="field-input pl-8" placeholder="3,500.00">
                    </div>
                </div>
                <div><label class="field-label">Cupos Libres</label><input id="salida-cupos" type="text" class="field-input" placeholder="8"></div>
            </div>
            <div><label class="field-label">Tag (subtítulo hero)</label><input id="salida-tag" type="text" class="field-input" placeholder="EL CARIBE MÁS HERMOSO"></div>
            <div>
                <label class="field-label">Imagen</label>
                <div class="flex gap-2">
                    <input id="salida-imagen" type="text" class="field-input flex-1" placeholder="assets/images/cancun.jpg">
                    <label class="btn-ghost cursor-pointer">
                        <i data-lucide="upload" class="w-4 h-4"></i> Subir
                        <input type="file" class="hidden" accept="image/*" onchange="handleFileUpload(this, 'salida-imagen')">
                    </label>
                </div>
            </div>
            <div>
                <label class="field-label">Mapa Embed URL</label>
                <div class="flex gap-2">
                    <input id="salida-mapEmbed" type="text" class="field-input flex-1" placeholder="https://www.google.com/maps/embed?...">
                    <button onclick="searchMapEmbed('salida-destino')" class="btn-ghost" title="Buscar en Google Maps">
                        <i data-lucide="search" class="w-4 h-4"></i>
                    </button>
                </div>
            </div>
            <div><label class="field-label">Descripción</label><textarea id="salida-descripcion" rows="3" class="field-input"></textarea></div>
            <div><label class="field-label">Más Información (Complementaria)</label><textarea id="salida-mas_info" rows="3" class="field-input" placeholder="Detalles adicionales de la salida..."></textarea></div>
            <div>
                <div class="flex justify-between items-center mb-2">
                    <label class="field-label" style="margin-bottom:0">¿Qué Incluye?</label>
                    <button onclick="addSalidaIncluye()" class="btn-ghost" style="padding:0.25rem 0.5rem;font-size:0.7rem"><i data-lucide="plus" class="w-3 h-3"></i> Agregar</button>
                </div>
                <div id="salida-incluye-list" class="space-y-2"></div>
            </div>
            <div>
                <div class="flex justify-between items-center mb-2">
                    <label class="field-label" style="margin-bottom:0">Itinerario (Días)</label>
                    <button onclick="addSalidaItin()" class="btn-ghost" style="padding:0.25rem 0.5rem;font-size:0.7rem"><i data-lucide="plus" class="w-3 h-3"></i> Agregar Día</button>
                </div>
                <div id="salida-itin-list" class="space-y-2"></div>
            </div>
        </div>
        <div class="p-6 border-t flex justify-end gap-3">
            <button onclick="closeModal('salida-modal')" class="btn-ghost">Cancelar</button>
            <button onclick="saveSalida()" class="btn-primary"><i data-lucide="save" class="w-4 h-4"></i> Guardar Salida</button>
        </div>
    </div>
</div>

<!-- TOAST -->
<div id="toast" class="fixed bottom-6 right-6 z-50 transition-all duration-300 translate-y-24 opacity-0 pointer-events-none">
    <div class="flex items-center gap-3 px-5 py-4 rounded-xl shadow-2xl text-sm font-bold text-white min-w-[260px]" id="toast-inner">
        <i id="toast-icon" data-lucide="check-circle" class="w-5 h-5 shrink-0"></i>
        <span id="toast-msg"></span>
    </div>
</div>

<script src="http://localhost:3000/admin/js/admin.js"></script>
</body>
</html>
